<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oneal - 酒標自動產圖系統 16:10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">

    <!-- 靜態網站所需函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .background-decor {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .blur-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }

        .blur-2 {
            width: 300px;
            height: 300px;
            background: #ec4899;
            bottom: -50px;
            left: -50px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .logo .icon {
            font-size: 2.2rem;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 狀態列 */
        .status-bar {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stats-group {
            display: flex;
            gap: 12px;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .stat-pill:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .stat-pill.muted {
            cursor: default;
            opacity: 0.8;
        }

        .stat-pill.muted:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .pill-divider {
            width: 1px;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .pill-value {
            color: var(--primary);
            font-weight: 600;
        }

        .actions-group {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .icon-btn.danger:hover {
            background: var(--error);
            border-color: var(--error);
        }

        .icon-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 操作區 */
        .action-container {
            padding: 32px;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-shell {
            width: 100%;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .upload-shell:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-icon {
            font-size: 3.5rem;
            opacity: 0.5;
            filter: grayscale(1);
            transition: var(--transition);
        }

        .upload-shell:hover .upload-icon {
            opacity: 1;
            filter: grayscale(0);
            transform: translateY(-5px);
        }

        .upload-text h3 {
            font-size: 1.25rem;
            margin-bottom: 4px;
        }

        .upload-text p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .file-tag {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--primary);
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #fff;
            animation: bounceIn 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* 進度區 */
        .progress-shell {
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .progress-layout {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .progress-visual {
            position: relative;
            width: 140px;
            height: 140px;
            flex-shrink: 0;
        }

        .progress-circle svg {
            transform: rotate(-90deg);
            width: 140px;
            height: 140px;
        }

        .circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 3;
        }

        .circle {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke: var(--primary);
            transition: stroke-dasharray 0.4s ease;
        }

        .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .progress-details {
            flex: 1;
            min-width: 0;
        }

        .progress-details h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-details p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .mini-log {
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry {
            margin-bottom: 2px;
            color: var(--text-muted);
        }

        .log-entry.success {
            color: var(--success);
        }

        .log-entry.error {
            color: var(--error);
        }

        /* 底部按鈕 */
        .card-footer {
            padding: 24px 32px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            flex: 1;
            min-width: 0;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(16, 185, 129, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hidden {
            display: none !important;
        }

        #toast-container {
            position: fixed;
            bottom: 32px;
            right: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .toast {
            padding: 14px 24px;
            background: rgba(30, 41, 59, 0.95);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            color: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideInRight 0.4s ease-out;
            font-size: 0.95rem;
        }

        .toast-success {
            border-color: var(--success);
        }

        .toast-error {
            border-color: var(--error);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .progress-layout {
                flex-direction: column;
                text-align: center;
            }

            .status-bar {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }

            .stats-group {
                flex-direction: column;
                width: 100%;
            }

            .stat-pill {
                justify-content: center;
                width: 100%;
            }

            .pill-divider {
                display: none;
            }

            .actions-group {
                width: 100%;
                justify-content: center;
            }

            .card-footer {
                flex-direction: column;
                padding: 16px;
                gap: 10px;
            }

            .btn {
                width: 100%;
                flex: none;
            }
        }
    </style>
</head>

<body>
    <div class="background-decor blur-1"></div>
    <div class="background-decor blur-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">🍷</span>
                <h1>Oneal</h1>
            </div>
        </header>

        <main>
            <section class="card main-card" id="main-interface">
                <!-- 狀態列：精簡顯示索引存取狀態 -->
                <div class="status-bar">
                    <div class="stats-group">
                        <div class="stat-pill" id="history-drop-zone" title="點擊切換歷史資料目錄">
                            <span class="pill-icon">📂</span>
                            <span id="folder-path-display">歷史索引</span>
                            <span class="pill-divider"></span>
                            <span id="stat-total" class="pill-value">--</span>
                        </div>
                        <div class="stat-pill muted">
                            <span class="pill-icon">🕒</span>
                            <span id="stat-last-update">--</span>
                        </div>
                    </div>
                    <div class="actions-group">
                        <button id="btn-refresh-index" class="icon-btn" title="同步更新索引">🔄</button>
                        <button id="btn-clear-index" class="icon-btn danger" title="清除索引資料">🗑️</button>
                    </div>
                    <input type="file" id="history-input" webkitdirectory directory hidden>
                </div>

                <!-- 核心操作區 -->
                <div class="action-container">
                    <!-- 狀態一：上傳與待機 -->
                    <div id="drop-zone" class="upload-shell">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">
                            <h3>上傳任務 Excel</h3>
                            <p>拖放檔案或點擊此處選擇</p>
                        </div>
                        <input type="file" id="file-input" accept=".xlsx, .xlsm" hidden>
                        <div id="file-info" class="file-tag hidden">
                            <span class="file-name"></span>
                        </div>
                    </div>

                    <!-- 狀態二：產圖進度 (初始隱藏) -->
                    <div id="task-status-section" class="progress-shell hidden">
                        <div class="progress-layout">
                            <div class="progress-visual">
                                <div class="progress-circle">
                                    <svg viewBox="0 0 36 36">
                                        <path class="circle-bg"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path class="circle" id="progress-path" stroke-dasharray="0, 100"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    </svg>
                                    <span class="percentage" id="task-percentage">0%</span>
                                </div>
                            </div>
                            <div class="progress-details">
                                <h3 id="current-task-name">準備中...</h3>
                                <p id="task-count">0 / 0</p>
                                <div class="mini-log" id="status-log"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 底部操作列 -->
                <div class="card-footer">
                    <button id="btn-start" class="btn btn-primary" disabled>
                        <span class="btn-icon">⚡</span> 進行任務
                    </button>
                    <button id="btn-download" class="btn btn-success hidden">
                        <span class="btn-icon">📥</span> 下載結果 ZIP
                    </button>
                    <button id="id-reset-ui" class="btn btn-secondary">
                        <span class="btn-icon">↩️</span> 重選任務
                    </button>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>

    <script>
        const elements = {
            historyDrop: document.getElementById('history-drop-zone'),
            historyInput: document.getElementById('history-input'),
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            fileInfo: document.getElementById('file-info'),
            fileName: document.querySelector('.file-name'),
            btnRemoveFile: document.getElementById('btn-remove-file'),
            btnStart: document.getElementById('btn-start'),
            statTotal: document.getElementById('stat-total'),
            statLastUpdate: document.getElementById('stat-last-update'),
            taskSection: document.getElementById('task-status-section'),
            progressPath: document.getElementById('progress-path'),
            taskPercentage: document.getElementById('task-percentage'),
            statusLog: document.getElementById('status-log'),
            btnDownload: document.getElementById('btn-download'),
            currentTaskName: document.getElementById('current-task-name'),
            taskCount: document.getElementById('task-count'),
            btnRefreshIndex: document.getElementById('btn-refresh-index'),
            btnClearIndex: document.getElementById('btn-clear-index'),
            statusIndex: document.getElementById('index-status'),
            btnReset: document.getElementById('id-reset-ui')
        };

        let brandIndex = {}; let addrIndex = {}; let imagePathMap = {};
        let currentTaskFile = null; let currentResultsZip = null;
        let defaultBgImg = null;
        window.allFilesMap = {}; // 用於 WebKitDirectory 模式的檔案記憶節點

        // --- 強化跨平台路徑處理 ---
        function normalizePath(p) {
            return p ? p.replace(/\\/g, '/') : "";
        }

        // 完全複刻 Go 版本的 GetGroup 邏輯
        // 來源: database/xlsx.go GetGroup()
        function getNormalizedName(str) {
            if (!str) return "";
            let s = String(str).trim();
            // 1. 去除容量標示 (e.g. 750ml)
            s = s.replace(/\d+ml/gi, "");
            // 2. 去除開頭的數字 (年份或序號)，使用 (\d*)(.*) group[2] 的邏輯
            s = s.replace(/^\d*/, "");
            // 3. 全部轉小寫
            s = s.toLowerCase();
            // 4. 只留下英文字母 a-z（與 Go 版本 charCode 65-90, 97-122 完全一致）
            return s.replace(/[^a-z]/g, "");
        }

        // 注意：基於效能考量，上述字串縮寫顯示，實際寫入時我會使用完整長度。

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = e => resolve(e.target.result);
                request.onerror = e => reject(e.target.error);
            });
        }

        async function saveIndexToDB() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(addrIndex, 'addrIndex');
                store.put(imagePathMap, 'imagePathMap');
                localStorage.setItem('oneal_last_update', new Date().toLocaleString());
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        elements.btnReset.onclick = () => {
            // 切換回上傳狀態
            elements.dropZone.classList.remove('hidden');
            elements.taskSection.classList.add('hidden');

            // 重置檔案相關狀態
            currentTaskFile = null;
            elements.fileInfo.classList.add('hidden');
            elements.btnStart.disabled = true;
            elements.btnStart.innerHTML = `<span class="btn-icon">⚡</span> 開始進行任務`;
            elements.btnDownload.classList.add('hidden');

            // 重置進度條
            updateProgress(0);
            elements.statusLog.innerHTML = "";
        };

        async function loadIndexFromDB() {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            return new Promise(resolve => {
                const reqAddr = store.get('addrIndex');
                reqAddr.onsuccess = () => {
                    addrIndex = reqAddr.result || {};
                    const reqImages = store.get('imagePathMap');
                    reqImages.onsuccess = () => {
                        imagePathMap = reqImages.result || {};
                        const reqHandle = store.get('directoryHandle');
                        reqHandle.onsuccess = () => {
                            if (reqHandle.result) {
                                elements.btnRefreshIndex.classList.remove('hidden');
                                const display = document.getElementById('folder-path-display');
                                if (display) display.textContent = reqHandle.result.name;
                            }
                            updateStats(); resolve();
                        };
                    };
                };
            });
        }

        elements.btnClearIndex.onclick = async () => {
            if (!confirm('確定要清空本地所有歷史索引嗎？下次使用需重新同步。')) return;
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            // 保留 directoryHandle，只刪據索引
            store.delete('addrIndex');
            store.delete('brandIndex');
            await new Promise(res => tx.oncomplete = res);
            brandIndex = {}; addrIndex = {}; imagePathMap = {};
            updateStats();
            showToast('索引已清空', 'success');
        };

        function formatVol(val) {
            let f = parseFloat(val);
            if (isNaN(f)) return val || "";
            if (f < 1) return (f * 100).toFixed(1) + "%";
            return f.toFixed(1) + "%";
        }

        function formatBtl(val) {
            let f = parseFloat(val);
            if (isNaN(f)) return val || "";
            if (f < 10) return Math.round(f * 1000) + "ML";
            return val + "ML";
        }

        function getCountry(address) {
            if (!address) return "";
            address = address.toLowerCase();
            if (address.includes("chile") || address.includes("chili")) return "智利";
            if (address.includes("germany")) return "德國";
            if (address.includes("france")) return "法國";
            if (address.includes("australia")) return "澳洲";
            if (address.includes("italy")) return "義大利";
            if (address.includes("portugal")) return "葡萄牙";
            if (address.includes("spain") || address.includes("españa") || address.includes("espana")) return "西班牙";
            if (address.includes("austria")) return "奧地利";
            if (address.includes("lebanon")) return "黎巴嫩";
            if (address.includes("usa")) return "美國";
            if (address.includes("argentina") || address.includes("argentine") || address.includes("angentina") || address.includes("angentine")) return "阿根廷";
            if (address.includes("scotland")) return "蘇格蘭";
            return "";
        }

                    // 尚未授權才申請（會彈上方小提示，非資料夾選取器）

                if (perm === 'granted') {
                    await syncFromHandle(handle);

        async function syncFromHandle(handle) {
            elements.btnRefreshIndex.disabled = true;
            elements.btnRefreshIndex.innerHTML = '⏳';
            elements.statTotal.textContent = '...';

            const display = document.getElementById('folder-path-display');
            if (display) display.textContent = handle.name;
            addLog(`正在讀取資料夾並掃描內容: ${handle.name}...`);

            // ★ 先清空記憶體中的舊索引，避免新舊 Key 混在一起
            brandIndex = {};
            addrIndex = {};
            imagePathMap = {};

            try {
                const excelFiles = [];
                const images = {}; // ID -> 完整路徑 Array

                async function deepScan(h, pathParts = []) {
                    for await (const entry of h.values()) {
                        const currentPath = [...pathParts, entry.name];
                        if (entry.kind === 'file') {
                            // 排除 Excel 暫存檔 (以 ~$ 開頭)
                            if (entry.name.endsWith('.xlsx')) {
                                if (entry.name.startsWith('~$')) {
                                    console.log(`[跳過暫存檔] ${entry.name}`);
                                    continue;
                                }
                                excelFiles.push({ handle: entry, pathParts });
                            }
                            if (/\.(png|jpg|jpeg)$/i.test(entry.name)) {
                                const id = entry.name.replace(/\.(png|jpg|jpeg)$/i, '');
                                images[id] = pathParts;
                            }
                        } else if (entry.kind === 'directory') {
                            await deepScan(entry, currentPath);
                        }
                    }
                }

                await deepScan(handle);
                imagePathMap = images;

                if (excelFiles.length === 0) throw new Error("資料夾內找不到任何 Excel 資料表");

                // 強制照字母與數字順序 (小到大) 排序，確保新的資料夾(大數字)最後掃描並覆蓋舊資料
                excelFiles.sort((a, b) => {
                    const pathA = [...a.pathParts, a.handle.name].join('/');
                    const pathB = [...b.pathParts, b.handle.name].join('/');
                    return pathA.localeCompare(pathB, undefined, { numeric: true });
                });

                for (const item of excelFiles) {
                    try {
                        const file = await item.handle.getFile();
                        const rows = await readExcel(file);
                        processHistoryData(rows, item.pathParts.join('/'));
                    } catch (fileErr) {
                        console.warn(`[讀取失敗] 檔案: ${item.handle.name}`, fileErr);
                        addLog(`忽略檔案 ${item.handle.name} (${fileErr.name})`, 'warning');
                    }
                }

                await saveIndexToDB();
                updateStats();
                showToast('同步成功！已為圖檔建立路徑索引。', 'success');
            } catch (err) {
                console.error("[同步錯誤]", err);
                // 針對 NotFoundError 提供更友好的提示
                if (err.name === 'NotFoundError') {
                    addLog('同步失敗: 找不到檔案或目錄。若您移動了資料夾，請重新點擊「選擇歷史資料目錄」選取。', 'error');
                } else if (err.name === 'SecurityError') {
                    addLog('同步失敗: 瀏覽器安全性限制。建議使用 localhost 開啟此網頁。', 'error');
                } else {
                    addLog('同步失敗: ' + (err.message || '未知錯誤'), 'error');
                }
            } finally {
                elements.btnRefreshIndex.disabled = false;
                elements.btnRefreshIndex.innerHTML = '🔄';
            }
        }

        async function processFileList(files) {
            const xlsxFiles = files.filter(f => f.name.endsWith('.xlsx') && !f.name.startsWith('~$'));
            if (xlsxFiles.length === 0) { addLog("找不到 Excel 檔案", "warning"); return; }
            
            // 強制照字母與數字順序 (小到大) 排序，確保 Mac 也是按照路徑順序覆蓋
            xlsxFiles.sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath, undefined, { numeric: true }));
            
            addLog(`開始掃描，共發現 ${xlsxFiles.length} 個檔案...`);
            window.allFilesMap = {};
            files.forEach(f => { window.allFilesMap[f.webkitRelativePath] = f; });
            brandIndex = {}; addrIndex = {};
            for (const file of xlsxFiles) {
                try {
                    const rows = await readExcel(file);
                    const fullPath = file.webkitRelativePath;
                    // 使用正規表達式相容 WebKit 在不同 OS 下的分隔符號
                    const pathParts = fullPath.split(/[\\\/]/);
                    const dirPath = pathParts.slice(0, -1).join('/');
                    processHistoryData(rows, dirPath, allFilesMap);
                } catch (err) { console.error(err); }
            }
            await saveIndexToDB(); updateStats();
            showToast('歷史索引(含正面圖片)已更新！', 'success');
        }

        async function readExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(e.target.result, { type: 'array' });
                    resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 }));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function processHistoryData(rows, dirPath) {
            let count = 0;
            rows.forEach((row) => {
                // 放寬條件：只要有 品名(row[1]) 就視為有效資料。不限制長度>=6，因為若結尾(如地址)為空，length會小於6
                if (row.length >= 2 && row[1]) {
                    const id = String(row[0] || "").trim();
                    const rawName = String(row[1]).trim();
                    const normalizedKey = getNormalizedName(rawName);
                    const location = String(row[5] || "").trim();

                    if (normalizedKey) {
                        const record = { id, location, sourceFile: dirPath, rawName: rawName };

                        // 衝突偵測：如果已經存在相同的 Key，印出警告說明「最後勝出者」
                        if (addrIndex[normalizedKey] && addrIndex[normalizedKey].id !== id) {
                            console.log(`%c[索引衝突] Key: "${normalizedKey}"`, 'color: #f59e0b; font-weight: bold;');
                            console.log(` - 舊資料: [${addrIndex[normalizedKey].sourceFile}] ID:${addrIndex[normalizedKey].id}`);
                            console.log(` - 新資料覆蓋: [${dirPath}] ID:${id} (勝出)`);
                        }

                        addrIndex[normalizedKey] = record;
                        count++;
                    }
                }
            });
            addLog(`已新增/更新 ${count} 筆索引`);
        }

        elements.btnStart.onclick = async () => {
            if (!currentTaskFile) return;

            // UI 狀態切換：隱藏上傳區，顯示進度區
            elements.dropZone.classList.add('hidden');

            updateProgress(0);

            try {

                    await document.fonts.ready;

                const rows = await readExcel(currentTaskFile);
                const zip = new JSZip();
                const labelsFolder = zip.folder("labels");

                // 使用 ExcelJS 載入原始檔案，以保留所有原始格式
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(await currentTaskFile.arrayBuffer());
                const sheet = workbook.worksheets[0];

                // 使用者指定：強制不略過表頭，從第一筆直接開始處理

                        vol: formatVol(row[2]),
                        brand: String(row[3] || "").trim(), // 製造商
                        btl: formatBtl(row[4]),

                        hColumn: String(row[7] || "").trim()
                    };

                    // 新增：強制打印每一行的開始處理訊息，確保 124 這類資料不會漏掉
                    console.log(`%c[開始處理] 序號:${data.serial}`, 'color: #94a3b8;');

                    const yearMatch = (data.productName || "").match(/\d{4}/);

                        data.year = "缺";
                        data.yearTitle = "年份";

                    data.isLowAlcohol = parseFloat(data.vol) <= 7.5;
                    const baseType = parseFloat(data.vol) >= 40 ? "白蘭地" : "葡萄酒";
                    data.wineType = baseType;

                    elements.currentTaskName.textContent = `${data.serial} - ${data.productName}`;
                    elements.taskCount.textContent = `${i + 1} / ${total}`;

                    let imgFound = false;
                    // 規一化比對 (Console 日誌輸出供診斷)
                    const normalizedTaskName = getNormalizedName(data.productName);
                    const rec = addrIndex[normalizedTaskName];

                    if (rec) {
                        console.log(`%c[比對成功] 序號:${data.serial}`, 'color: #6366f1; font-weight: bold;');
                        console.log(` - 匹配索引: "${normalizedTaskName}"`);
                        console.log(` - 歷史來源: [${rec.sourceFile}]`);
                        console.log(` - 圖檔編號: ${rec.id}`);
                        data.address = rec.location || data.address;

                        // 圖檔尋找邏輯
                        if (handle) {
                            const pathParts = (rec.sourceFile ? rec.sourceFile.split(/[\\\/]/) : (imagePathMap[rec.id] || []));
                            let targetDir = handle;
                            try {
                                for (const part of pathParts) {
                                    if (!part) continue;
                                    targetDir = await targetDir.getDirectoryHandle(part);
                                }
                                for (const ext of ['.png', '.jpg', '.jpeg', '.PNG', '.JPG']) {
                                    try {
                                        const h = await targetDir.getFileHandle(`${rec.id}${ext}`);
                                        const imgFile = await h.getFile();
                                        labelsFolder.file(`${data.serial}.png`, imgFile);
                                        imgFound = true;
                                        break;
                                    } catch (e) { }
                                }
                            } catch (e) { }
                        } else if (window.allFilesMap) {
                            // 支援 WebKitDirectory 模式 (Safari/Mac)
                            for (const ext of ['.png', '.jpg', '.jpeg', '.PNG', '.JPG']) {
                                const fileName = `${rec.id}${ext}`;
                                const tryPath = rec.sourceFile ? `${rec.sourceFile}/${fileName}` : fileName;
                                const fileInMap = window.allFilesMap[tryPath] || window.allFilesMap[fileName];

                                if (fileInMap) {
                                    labelsFolder.file(`${data.serial}.png`, fileInMap);
                                    imgFound = true;
                                    break;
                                }
                            }
                        }
                    } else {
                        console.log(`%c[比對失敗] 序號:${data.serial} | 找不到符合的歷史資料 ("${normalizedTaskName}")`, 'color: #f59e0b;');
                    }

                    // --- 最終地址確定後，才進行國家識別與標題生成 ---
                    data.country = getCountry(data.address);
                    data.labelTitle = `${data.country}${data.wineType}`;

                    // 標記缺失項：在 G 欄絕對位置寫入「缺」
                    // ExcelJS 的列是從 1 開始計算。索引 = i + Excel起始值(1)
                    const rowIdx = i + 1;
                    if (!imgFound) {
                        try { sheet.getCell(`G${rowIdx}`).value = '缺'; } catch (e) { }
                    }

                    if ((!yearMatch || data.isLowAlcohol) && !data.hColumn) {
                        try { sheet.getCell(`H${rowIdx}`).value = '缺'; } catch (e) { }
                    }

                    if (i % 20 === 0) await new Promise(res => setTimeout(res, 0));

                    const canvas = await generateLabel(data);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    labelsFolder.file(`${data.serial}-1.png`, blob);

                    updateProgress(((i + 1) / total) * 90);
                    if (i % 5 === 0) { // 加強日誌頻率

                        addLog(`${matchIcon} 處理中: ${i + 1}/${total} (${data.serial})`);

                }

                // 儲存標記過的 Excel (使用原檔名 + _比對)
                const excelBuffer = await workbook.xlsx.writeBuffer();
                const baseName = currentTaskFile.name.substring(0, currentTaskFile.name.lastIndexOf('.'));
                zip.file(`${baseName}_比對.xlsx`, excelBuffer);

                currentResultsZip = await zip.generateAsync({ type: "blob" });
                const unixTime = Math.floor(Date.now() / 1000);
                const finalFileName = `${baseName}_${unixTime}.7z`;

                // 自動觸發下載
                saveAs(currentResultsZip, finalFileName);

                updateProgress(100);
                addLog('任務完成！檔案已自動下載。', 'success');

            elements.btnStart.disabled = false;
        };

        async function generateLabel(data) {
            const canvas = document.createElement('canvas'); canvas.width = 500; canvas.height = data.isLowAlcohol ? 650 : 550;
            const ctx = canvas.getContext('2d');

            // 標籤底色一律使用白色
            ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#000'; ctx.strokeStyle = '#000';

            // Header - 修正字級 67px, 座標 75
            ctx.font = '700 67px "Noto Sans TC", sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(data.labelTitle, canvas.width / 2, 75);
            ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(12, 105); ctx.lineTo(488, 105); ctx.stroke();

            // Body - 修正字級 25px
            ctx.font = '400 25px "Noto Sans TC", sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(`品牌名稱: 見原文標`, 12, 145); ctx.fillText(`原產地: ${data.country}`, 280, 145);
            ctx.fillText(`產品種類: ${data.wineType}`, 12, 185); ctx.fillText(`容量: ${data.btl}`, 280, 185);
            ctx.fillText(`產品批號: 見瓶身`, 12, 225); ctx.fillText(`酒精度: ${data.vol}`, 280, 225);
            const yearLabel = `${data.yearTitle || '年份'}: `;
            ctx.fillText(yearLabel, 12, 265);
            if (data.year === "缺") ctx.fillStyle = '#f00';
            ctx.fillText(data.year, 12 + ctx.measureText(yearLabel).width, 265);
            ctx.fillStyle = '#000';

            if (data.isLowAlcohol) {
                ctx.fillText(`保存期限: 五年`, 280, 265);
            }
            ctx.fillText(`製造者名稱與地址 : `, 12, 305);

            // 自動縮小品牌名稱字級
            let brandSize = 25;
            const maxBrandW = 500 - 240 - 12; // 總寬 - 起點 - 邊距
            ctx.font = `400 ${brandSize}px "Noto Sans TC", sans-serif`;
            let brandW = ctx.measureText(data.brand).width;

            if (brandW > maxBrandW) {
                brandSize = Math.max(12, Math.floor(brandSize * (maxBrandW / brandW)));
                ctx.font = `400 ${brandSize}px "Noto Sans TC", sans-serif`;
            }
            ctx.fillText(data.brand, 240, 305);

            ctx.font = '400 22px "Noto Sans TC", sans-serif';
            const addr = data.address || "(索引中查無地址，請手動輸入)";

            // 智慧型斷行：避免切斷單字 (支援空格與連字號)
            const wrapAddress = (text, maxW) => {
                // 將空格與連字號都視為可斷點，但保留連字號
                const words = text.split(/(\s+|-)/);
                let lines = [];
                let currentLine = '';
                words.forEach(word => {
                    if (!word) return;
                    const testLine = currentLine + word;
                    if (ctx.measureText(testLine).width > maxW && currentLine !== '') {
                        lines.push(currentLine.trim());
                        currentLine = word.startsWith(' ') ? word.substring(1) : word;
                    } else {
                        currentLine = testLine;
                    }
                });
                if (currentLine) lines.push(currentLine.trim());
                return lines;
            };

            const addrLines = wrapAddress(addr, 460); // 預留邊距
            addrLines.forEach((line, idx) => {
                if (idx < 2) { // 最多顯示兩行防止重疊
                    ctx.fillText(line, 12, 340 + (idx * 32));
                }
            });

            // Footer - 取消分隔線以符合設計需求
            const fY = 410;

            if (defaultBgImg) {
                // 如果有背景圖，將其繪製在下半部區域 (移除線條並調整高度避免壓扁)
                // 從 y=390 開始，高度增加到 160 以填滿底部
                const bgHeight = data.isLowAlcohol ? 190 : 160;
                ctx.drawImage(defaultBgImg, 12, 390, 476, bgHeight);
                if (data.isLowAlcohol) {
                    const btlDate = data.hColumn || "缺";
                    ctx.font = '25px "Noto Sans TC", sans-serif';
                    ctx.fillStyle = '#000';
                    const btlLabel = `裝瓶日 : `;
                    ctx.fillText(btlLabel, 12, 605);
                    if (btlDate === "缺") ctx.fillStyle = '#f00';
                    ctx.fillText(btlDate, 12 + ctx.measureText(btlLabel).width, 605);
                    ctx.fillStyle = '#000';
                }
            } else {
                // 如果沒有背景圖，才顯示預設文字與分隔線
                ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(12, 400); ctx.lineTo(488, 400); ctx.stroke();
                // 如果沒有背景圖，才顯示預設文字
                ctx.font = '16px "Noto Sans TC"';
                ctx.fillText("進口商：大同亞瑟頓股份有限公司", 12, fY + 20);
                ctx.fillText("地址：台北市中山北路三段22號", 12, fY + 45);
                ctx.fillText("電話：(02)2592-5252 分機 2280", 12, fY + 70);
                ctx.font = 'bold 32px "Noto Sans TC"'; ctx.fillText("飲酒過量  有礙健康", 12, fY + 120);
                drawRecycle(ctx, 400, fY + 5, 60);

                if (data.isLowAlcohol) {
                    const btlDate = data.hColumn || "缺";
                    ctx.font = '25px "Noto Sans TC", sans-serif';
                    ctx.fillStyle = '#000';
                    const btlLabel = `裝瓶日 : `;
                    ctx.fillText(btlLabel, 12, fY + 155);
                    if (btlDate === "缺") ctx.fillStyle = '#f00';
                    ctx.fillText(btlDate, 12 + ctx.measureText(btlLabel).width, fY + 155);
                    ctx.fillStyle = '#000';
                }
            }
            return canvas;
        }

        function drawRecycle(ctx, x, y, s) {
            ctx.strokeStyle = '#000'; ctx.strokeRect(x, y, s, s);
            ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center'; ctx.fillText("♻️", x + s / 2, y + s / 2 + 10);
            ctx.font = '12px "Noto Sans TC"'; ctx.fillText("資源回收", x + s / 2, y + s + 15);
        }

        function updateProgress(p) { elements.taskPercentage.textContent = Math.round(p) + '%'; elements.progressPath.style.strokeDasharray = `${p}, 100`; }
        function addLog(m, t = 'info') { const d = document.createElement('div'); d.className = `log-entry ${t}`; d.textContent = `> ${m}`; elements.statusLog.appendChild(d); elements.statusLog.scrollTop = elements.statusLog.scrollHeight; }
        function showToast(m, t = 'info') { const tst = document.createElement('div'); tst.className = `toast toast-${t}`; tst.textContent = m; document.getElementById('toast-container').appendChild(tst); setTimeout(() => tst.remove(), 3000); }

        // 初始化：從內嵌 Data URL 載入背景圖
        function preloadDefaultBg() {
            // 使用之前提取出的完整 Base64 字串 (為了展示簡潔，此處僅標記邏輯)
            const img = new Image();
            img.onload = () => { defaultBgImg = img; };
            // 將下面這一行替換為完整的 data:image/jpeg;base64,... 字串
            img.src = DEFAULT_BG_DATA_URL;
        }

        preloadDefaultBg();
        loadIndexFromDB();
    </script>
</body>

</html>
